    <!-- Dynamic Favicon Link -->
    <link id="dynamic-favicon" rel="icon" type="image/png" href="https://firebasestorage.googleapis.com/v0/b/kcyc-site.firebasestorage.app/o/LOGO%20KCYC%2FGroup%206680%20(1).png?alt=media&token=a82c8a88-8e02-40ba-9bcc-9126138fe47e" />

    <!-- Favicon Logic -->
    <script>
      (function() {
        const lightIcon = "https://firebasestorage.googleapis.com/v0/b/kcyc-site.firebasestorage.app/o/LOGO%20KCYC%2FGroup%206680%20(1).png?alt=media&token=a82c8a88-8e02-40ba-9bcc-9126138fe47e";
        const darkIcon = "https://firebasestorage.googleapis.com/v0/b/kcyc-site.firebasestorage.app/o/LOGO%20KCYC%2FFrame%201018%20(1).png?alt=media&token=a44eebf0-272c-4d07-9c14-83b8eb86af7e";

        function updateFavicon() {
          const favicon = document.getElementById('dynamic-favicon');
          const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (favicon) {
            favicon.href = isDark ? darkIcon : lightIcon;
          }
        }

        // Run immediately
        updateFavicon();

        // Listen for changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
      })();
    </script>
