<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#031B47" />
    <title>Київська Міська Молодіжна Рада | КММР</title>
    
    <!-- Dynamic Favicon Link -->
    <link id="dynamic-favicon" rel="icon" type="image/png" href="https://firebasestorage.googleapis.com/v0/b/kcyc-site.firebasestorage.app/o/LOGO%20KCYC%2FGroup%206680%20(1).png?alt=media&token=a82c8a88-8e02-40ba-9bcc-9126138fe47e" />

    <!-- Favicon Logic -->
    <script>
      (function() {
        const lightIcon = "https://firebasestorage.googleapis.com/v0/b/kcyc-site.firebasestorage.app/o/LOGO%20KCYC%2FGroup%206680%20(1).png?alt=media&token=a82c8a88-8e02-40ba-9bcc-9126138fe47e";
        const darkIcon = "https://firebasestorage.googleapis.com/v0/b/kcyc-site.firebasestorage.app/o/LOGO%20KCYC%2FFrame%201018%20(1).png?alt=media&token=a44eebf0-272c-4d07-9c14-83b8eb86af7e";

        function updateFavicon() {
          const favicon = document.getElementById('dynamic-favicon');
          const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (favicon) {
            favicon.href = isDark ? darkIcon : lightIcon;
          }
        }

        // Run immediately
        updateFavicon();

        // Listen for changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      html, body {
        font-family: 'Montserrat', sans-serif;
        background-color: #031B47; /* Background matches footer to prevent white flash on overscroll */
        overscroll-behavior-y: none; /* Disables the "rubber band" bounce effect */
        overflow-x: hidden; /* Prevents horizontal scrolling caused by overflowing elements */
        height: 100%;
        width: 100%;
      }
      #root {
        min-height: 100%;
        background-color: #ffffff;
      }
      html.dark #root {
        background-color: #030712; /* gray-950 */
      }

      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .dark ::-webkit-scrollbar-track {
        background: #1f2937;
      }
      ::-webkit-scrollbar-thumb {
        background: #031B47;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #D7269B;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
